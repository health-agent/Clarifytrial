<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="900" viewBox="0 0 1800 900" role="img" aria-labelledby="title desc">
  <title id="title">ClarifyTrial 전체 실행 흐름</title>
  <desc id="desc">임상시험과 환자 정보를 구조화하고 정보 의존 관계망과 최소 결정 정보 집합을 계산한 뒤, 질문이나 조회 결과와 관련된 기준만 다시 판단해 추천하는 흐름</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #475569; }
      .section { font: 700 18px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #334155; }
      .label { font: 700 19px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #0f172a; text-anchor: middle; }
      .small { font: 400 15px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #475569; text-anchor: middle; }
      .tiny { font: 400 14px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #64748b; }
      .arrow-label { font: 700 15px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #334155; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 8; }
      .future { fill: #ffffff; stroke: #64748b; stroke-width: 2; stroke-dasharray: 10 8; rx: 8; }
      .state { fill: #dbeafe; stroke: #2563eb; stroke-width: 3; rx: 8; }
      .question { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
      .rule { fill: #dcfce7; stroke: #16a34a; stroke-width: 3; rx: 8; }
      .review { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 8; }
      .output { fill: #f3e8ff; stroke: #9333ea; stroke-width: 3; rx: 8; }
      .line { fill: none; stroke: #475569; stroke-width: 3; marker-end: url(#arrow); }
      .loop { fill: none; stroke: #d97706; stroke-width: 3; marker-end: url(#arrow); }
      .dashed-line { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 9 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1800" height="900"/>
  <text class="title" x="60" y="58">ClarifyTrial: 필요한 정보를 확인하고, 관련 기준만 다시 판단한다</text>
  <text class="subtitle" x="60" y="91">여러 임상시험을 하나의 환자 상태로 연결하는 대화형 추천 구조</text>

  <text class="section" x="60" y="132">1. 입력과 구조화</text>
  <text class="section" x="650" y="132">2. 공유 상태와 최초 판단</text>
  <text class="section" x="1170" y="132">3. 정보 획득 또는 최종 결정</text>

  <rect class="future" x="60" y="158" width="250" height="116"/>
  <text class="label" x="185" y="198">임상시험 원문</text>
  <text class="small" x="185" y="228">향후 ClinicalTrials.gov</text>
  <text class="small" x="185" y="251">+ 후보 임상시험 검색</text>

  <rect class="box" x="60" y="310" width="250" height="108"/>
  <text class="label" x="185" y="351">환자 정보 문장</text>
  <text class="small" x="185" y="381">처음에는 일부 정보가 없음</text>

  <rect class="box" x="365" y="158" width="250" height="116"/>
  <text class="label" x="490" y="197">선정·제외 기준 구조화</text>
  <text class="small" x="490" y="227">현재: 휴리스틱 데모</text>
  <text class="small" x="490" y="250">다음: 언어모델 + 원문 근거</text>

  <rect class="box" x="365" y="310" width="250" height="108"/>
  <text class="label" x="490" y="350">환자 정보 구조화</text>
  <text class="small" x="490" y="380">나이·질환·검사·치료이력</text>

  <path class="dashed-line" d="M310 216 H365"/>
  <path class="line" d="M310 364 H365"/>

  <rect class="state" x="670" y="190" width="305" height="206"/>
  <text class="label" x="822" y="229">환자별 공통 상태</text>
  <text class="small" x="822" y="261">모든 임상시험 상태를 한곳에 저장</text>
  <text class="small" x="822" y="294">환자 정보 · 임상시험별 기준 상태</text>
  <text class="small" x="822" y="327">공통 부족 정보 · 질문 · 답변 기록</text>
  <text class="small" x="822" y="360">질문·답변 횟수와 이력</text>

  <path class="line" d="M615 216 H650 Q670 216 670 236"/>
  <path class="line" d="M615 364 H650 Q670 364 670 344"/>

  <rect class="box" x="1030" y="220" width="230" height="132"/>
  <text class="label" x="1145" y="258">기준별 근거 판정</text>
  <text class="small" x="1145" y="289">조건 판단: 충족 · 위반 · 모름</text>
  <text class="small" x="1145" y="319">참여 영향: 지원 · 차단 · 불확실</text>
  <path class="line" d="M975 293 H1030"/>

  <polygon points="1330,286 1430,205 1530,286 1430,367" fill="#ffffff" stroke="#475569" stroke-width="3"/>
  <text class="label" x="1430" y="270">남은 답에 따라</text>
  <text class="label" x="1430" y="295">판정이 달라질</text>
  <text class="label" x="1430" y="320">수 있는가?</text>
  <path class="line" d="M1260 286 H1330"/>

  <rect class="rule" x="1570" y="174" width="190" height="224"/>
  <text class="label" x="1665" y="216">판정·추천 규칙</text>
  <text class="small" x="1665" y="250">참여 차단 기준 우선</text>
  <text class="small" x="1665" y="280">필수 미확인 → 불확실</text>
  <text class="small" x="1665" y="310">관련성은 순위에만 사용</text>
  <text class="small" x="1665" y="340">상태 갱신과 추천은</text>
  <text class="small" x="1665" y="364">결정론적 코드로 처리</text>
  <path class="line" d="M1530 286 H1570"/>
  <text class="arrow-label" x="1537" y="270">아니오</text>

  <rect class="output" x="1515" y="456" width="245" height="142"/>
  <text class="label" x="1638" y="495">최종 결과</text>
  <text class="small" x="1638" y="525">추천 순위 + 기준별 근거</text>
  <text class="small" x="1638" y="553">남은 질문 + 쉬운 설명</text>
  <text class="small" x="1638" y="579">의료적 면책 고지</text>
  <path class="line" d="M1665 398 V456"/>

  <rect class="question" x="1175" y="455" width="250" height="128"/>
  <text class="label" x="1300" y="493">정보 의존 관계망</text>
  <text class="small" x="1300" y="523">개념·단위·검체·시점 호환 확인</text>
  <text class="small" x="1300" y="550">부족 정보와 영향받는 기준 연결</text>
  <path class="loop" d="M1430 367 V420 Q1430 455 1400 455"/>
  <text class="arrow-label" x="1445" y="416">예</text>

  <rect class="question" x="890" y="455" width="225" height="128"/>
  <text class="label" x="1002" y="493">정보 조합 선택</text>
  <text class="small" x="1002" y="523">최소 결정 정보 집합 계산</text>
  <text class="small" x="1002" y="550">판정이 결정될 때까지 반복</text>
  <path class="loop" d="M1175 519 H1115"/>

  <rect class="future" x="615" y="455" width="220" height="128"/>
  <text class="label" x="725" y="492">정보 획득</text>
  <text class="small" x="725" y="522">FHIR → 임상 기록 → 직접 질문</text>
  <text class="small" x="725" y="549">확인 결과를 구조화된 답변으로</text>
  <path class="loop" d="M890 519 H835"/>

  <rect class="box" x="350" y="455" width="210" height="128"/>
  <text class="label" x="455" y="493">답변 정규화</text>
  <text class="small" x="455" y="523">자유 문장을 검증된 값으로</text>
  <text class="small" x="455" y="550">바꾼 뒤 상태에 반영</text>
  <path class="loop" d="M615 519 H560"/>

  <rect class="question" x="640" y="650" width="325" height="128"/>
  <text class="label" x="802" y="689">관련 기준 재평가</text>
  <text class="small" x="802" y="720">답변과 관련된 참여 기준만 다시 판단</text>
  <text class="small" x="802" y="748">전체 과정을 처음부터 반복하지 않음</text>
  <path class="loop" d="M455 583 V714 H640"/>
  <path class="loop" d="M965 714 H1010 Q1030 714 1030 690 V352"/>
  <text class="arrow-label" x="1000" y="699">업데이트 후 반복</text>

  <rect class="review" x="1175" y="650" width="250" height="128"/>
  <text class="label" x="1300" y="689">사람 검토로 전환</text>
  <text class="small" x="1300" y="719">근거가 충돌하거나</text>
  <text class="small" x="1300" y="746">추가 확인으로 판단 불가</text>
  <path class="dashed-line" d="M1300 583 V650"/>

  <line x1="60" y1="815" x2="1760" y2="815" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="1375" y="835" width="18" height="18" fill="#ffffff" stroke="#64748b" stroke-width="2" stroke-dasharray="5 4"/>
  <text class="tiny" x="1404" y="850">향후 구현</text>
  <rect x="1505" y="835" width="18" height="18" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text class="tiny" x="1534" y="850">현재 자료 구조·규칙·시연</text>
  <text class="tiny" x="60" y="870">모든 예시는 합성 데이터 기반 소프트웨어 평가용이며, 실제 의료 판단을 대신하지 않습니다.</text>
</svg>
